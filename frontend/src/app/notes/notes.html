<div class="container py-5">

  <h2 class="text-center mb-4">
    <i class="bi bi-journal-text"></i>
    Simple Notes
  </h2>

  <div *ngIf="showError" class="alert alert-danger">
    Note cannot be empty
  </div>

  <div class="card shadow-sm mb-4">
    <div class="card-body">

      <div class="input-group">

        <input
          #noteInput
          class="form-control"
          placeholder="Write a note..."
          [(ngModel)]="newNote"
          (keyup.enter)="addNote()"
        />

        <button
          type="button"
          class="btn btn-primary"
          (click)="addNote()"
        >
          <i class="bi bi-plus-lg"></i>
        </button>

      </div>

    </div>
  </div>

  <div *ngIf="notes.length === 0" class="text-center text-muted mt-5">
    <i class="bi bi-sticky fs-1"></i>
    <p class="mt-3">No notes available</p>
  </div>

  <div class="row g-3">

    <div
      class="col-md-6 col-lg-4"
      *ngFor="let note of notes; trackBy: trackById"
    >

      <div class="card note-card h-100">

        <div class="card-body d-flex flex-column">

          <div class="flex-grow-1">
            <p class="note-text">
              {{ note.content }}
            </p>
          </div>

          <div class="d-flex justify-content-between align-items-center mt-3">

            <small class="text-muted">
              <i class="bi bi-clock"></i>
              {{ note.createdDate | date:'medium' }}
            </small>

            <button
              type="button"
              class="btn btn-outline-danger btn-sm"
              (click)="deleteNote(note.id)"
            >
              <i class="bi bi-trash"></i>
            </button>

          </div>

        </div>

      </div>

    </div>

  </div>

</div>
